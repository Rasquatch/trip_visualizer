<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>OpenRouteService API Test</h1>
    <div id="results">Testing...</div>
    
    <script>
        async function testAPI() {
            const results = document.getElementById('results');
            const apiKey = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjkzZmVhZmUwZGUzZTQzYmVhMzJlYTkzYWE3YzJiMDQ5IiwiaCI6Im11cm11cjY0In0=';
            
            try {
                console.log('Testing API call...');
                const response = await fetch(
                    `https://api.openrouteservice.org/v2/directions/driving-car?api_key=${apiKey}&start=-78.8,35.5843&end=-78.4594,38.6646`,
                    { headers: { 'Accept': 'application/json' } }
                );
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status} ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('API Response:', data);
                
                results.innerHTML = `
                    <h2>Success!</h2>
                    <p>Status: ${response.status}</p>
                    <p>Distance: ${data.features[0].properties.summary.distance}m</p>
                    <p>Duration: ${data.features[0].properties.summary.duration}s</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
            } catch (error) {
                console.error('API Test Failed:', error);
                results.innerHTML = `
                    <h2>Failed!</h2>
                    <p>Error: ${error.message}</p>
                    <p>This means the API is blocked by CORS or the key is invalid.</p>
                `;
            }
        }
        
        // Run test
        testAPI();
    </script>
</body>
</html>
